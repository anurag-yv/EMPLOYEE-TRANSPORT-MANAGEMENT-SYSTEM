services:
  - type: web
    name: employee-transport-api
    env: java
    region: ohio
    plan: free
    rootDir: ./employee-transport-system
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/employee-transport-system-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        # Set this to your MySQL connection string (e.g., from Aiven or PlanetScale)
        # For local testing it was: jdbc:mysql://localhost:3306/transport_db
        value: ${MYSQL_URL}
      - key: SPRING_DATASOURCE_USERNAME
        value: ${MYSQL_USER}
      - key: SPRING_DATASOURCE_PASSWORD
        value: ${MYSQL_PASSWORD}
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  - type: web
    name: employee-transport-ui
    env: static
    region: ohio
    plan: free
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: employee-transport-api
          property: host
