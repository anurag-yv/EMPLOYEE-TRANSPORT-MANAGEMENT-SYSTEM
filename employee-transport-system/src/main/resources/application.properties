# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/transport_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
# Let Hibernate detect the dialect automatically
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Server
server.port=${PORT:8081}

# JWT
jwt.secret=${JWT_SECRET:transitport-default-dev-secret-key-change-this}
jwt.expiration=86400000

# Logging
logging.level.com.example=INFO