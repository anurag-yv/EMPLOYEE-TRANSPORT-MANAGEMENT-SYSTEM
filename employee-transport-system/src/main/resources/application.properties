# =========================================
# MySQL Database Configuration
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/employee_transport_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Server
server.port=8081

# JWT
jwt.secret=transitport-very-secure-secret-key-2024-xYz!@#
jwt.expiration=86400000

# Logging
logging.level.com.example=INFO