# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/transport_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&connectionTimeZone=SERVER&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# Server
server.port=${PORT:1001}

# JWT - Use JWT_SECRET env var or fallback for development only
jwt.secret=${JWT_SECRET:dev-secret-key-min-256-bits-for-local-development-use-only-abcdefghijklmnopqr}
jwt.expiration=86400000

# Logging
logging.level.com.example=INFO

# Kafka (local dev defaults)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=transport-system

# Actuator & Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Resilience4j Rules
resilience4j.circuitbreaker.instances.bookingService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.bookingService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.bookingService.waitDurationInOpenState=10000
resilience4j.retry.instances.bookingService.maxAttempts=3
resilience4j.retry.instances.bookingService.waitDuration=500